model:
  feature_dim: 25       # IHDP has 25 covariates
  latent_dim: 20        # dim(z); CEVAE paper default
  hidden_dim: 64        # hidden layer width; proportionate to latent_dim=20 and ~550 training subjects
  num_layers: 2         # depth of encoder/decoder MLPs

diffusion:
  num_steps: 100        # L diffusion steps
  beta_start: 0.0001
  beta_end: 0.5         # DiffPO value for tabular PO data
  schedule: quad        # quadratic; DiffPO default for tabular PO data
  embedding_dim: 32     # sinusoidal time embedding dim; matched to block_dim to avoid 4x reduction in diffusion_projection
  block_dim: 32         # I/O width of cond_proj, mapping_noise, and each ResidualBlock; proportionate to latent_dim=20 on IHDP (~747 subjects)
  hidden_dim: 32        # output head width (output_projection1/2, y0/y1 layers); contracts like DiffPO (cond_dim -> hidden_dim)
  num_blocks: 4         # number of residual blocks

train:
  epochs: 500
  batch_size: 128
  lr: 0.0005            # DiffPO paper value
  seed: 42
  K: 50                 # PO samples at inference
  patience: 20          # early stopping patience on total val ELBO
  warmup_epochs: 50     # patience not armed until this epoch
  checkpoint_dir: checkpoints

data:
  path: data/ihdp
  replication: 1        # which IHDP NPCI replication to use (1-indexed, 1-10 available)
  train_ratio: 0.7      # 70% train; val = test = (1 - train_ratio) / 2 = 15% each
  test_ratio: 0.15      # 15% test; val inferred as remaining (1 - train_ratio - test_ratio = 0.15)
